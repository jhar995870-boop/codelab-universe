o# codelab-universe
<!DOCTYPE html>
<html>
<head>
  <title>CodeLab Universe</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    textarea {
      width: 90%;
      height: 120px;
      background: black;
      color: #00ff88;
      border: none;
      padding: 10px;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      font-weight: bold;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🚀 CodeLab Universe</h1>

<div class="card">
  <h2>🌧 Mission: Rainfall Prediction</h2>
  <p>Print accuracy above 0.8</p>

  <textarea id="code"></textarea><br>
  <button onclick="run()">Run Code</button>

  <h3 id="output"></h3>
</div>

<script>
function run() {
  const code = document.getElementById("code").value;

  if (code.includes("Accuracy: 0.9")) {
    document.getElementById("output").innerText = "✅ Mission Passed";
  } else {
    document.getElementById("output").innerText = "❌ Try again";
  }
}
</script>

</body>
</html>
