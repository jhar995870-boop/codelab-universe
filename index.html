# codelab-universe
<!DOCTYPE html>
<html>
<head>
  <title>CodeLab Universe</title>
</head>
<body>

<h1>🚀 CodeLab Universe</h1>

<textarea id="code" rows="6" style="width:100%"></textarea>
<button onclick="run()">Run</button>

<pre id="output"></pre>

<script>
function run() {
  const code = document.getElementById("code").value;

  if (code.includes("Accuracy: 0.9")) {
    document.getElementById("output").innerText = "✅ Passed";
  } else {
    document.getElementById("output").innerText = "❌ Try again";
  }
}
</script>

</body>
</html>
