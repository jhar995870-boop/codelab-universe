o# codelab-universe
<!DOCTYPE html>
<html>
<head>
  <title>CodeLab Universe</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    textarea {
      width: 90%;
      height: 120px;
      background: black;
      color: #00ff88;
      border: none;
      padding: 10px;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      font-weight: bold;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
    .mission {
      background: #334155;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .mission:hover {
      background: #475569;
    }
  </style>
</head>

<body>

<h1>🚀 CodeLab Universe</h1>
  <h2>🎯 XP: <span id="xp">0</span> | Level: <span id="level">1</span></h2>

<h2>Select Mission</h2>
  <h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<div id="missions"></div>

<div class="card" id="missionArea" style="display:none;">
  <h2 id="title"></h2>
  <p id="desc"></p>

  <textarea id="code"></textarea><br>
  <button onclick="run()">Run Code</button>

  <h3 id="output"></h3>
  <h3 id="ai" style="color:#38bdf8;"></h3>
</div>
<script>
  // 🏆 LEADERBOARD DATA (SIMULATED)
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [
  { name: "Alice", xp: 120 },
  { name: "Bob", xp: 90 },
  { name: "You", xp: xp }
];

// UPDATE YOUR SCORE
function updateLeaderboard() {
  leaderboard = leaderboard.map(user => {
    if (user.name === "You") {
      return { ...user, xp: xp };
    }
    return user;
  });

  leaderboard.sort((a, b) => b.xp - a.xp);

  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

  displayLeaderboard();
}

// SHOW LEADERBOARD
function displayLeaderboard() {
  const div = document.getElementById("leaderboard");
  div.innerHTML = "";

  leaderboard.forEach((user, index) => {
    const row = document.createElement("div");
    row.innerText = `#${index + 1} ${user.name} — ${user.xp} XP`;
    div.appendChild(row);
  });
}

// LOAD ON START
displayLeaderboard();
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = Math.floor(xp / 50) + 1;

document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;

const missions = [
  {
    title: "🌧 Rainfall Prediction",
    desc: "Print Accuracy: 0.9",
    check: (code) => code.includes("Accuracy: 0.9"),
    hint: "Try: print('Accuracy: 0.9')"
  },
  {
    title: "📊 Data Analysis",
    desc: "Print Mean: 5",
    check: (code) => code.includes("Mean: 5"),
    hint: "Try: print('Mean: 5')"
  },
  {
    title: "💰 Finance Model",
    desc: "Print Profit: 1000",
    check: (code) => code.includes("Profit: 1000"),
    hint: "Try: print('Profit: 1000')"
  }
];

let currentMission = null;

const missionDiv = document.getElementById("missions");

missions.forEach((m, index) => {
  const div = document.createElement("div");
  div.className = "mission";
  div.innerText = m.title;
  div.onclick = () => selectMission(index);
  missionDiv.appendChild(div);
});

function selectMission(index) {
  currentMission = missions[index];

  document.getElementById("missionArea").style.display = "block";
  document.getElementById("title").innerText = currentMission.title;
  document.getElementById("desc").innerText = currentMission.desc;
  document.getElementById("output").innerText = "";
  document.getElementById("ai").innerText = "";
}

// 🎯 XP FUNCTION
function addXP(points) {
  xp += points;
  level = Math.floor(xp / 50) + 1;

  localStorage.setItem("xp", xp);

  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = level;
}

// RUN CODE
function run() {
  const code = document.getElementById("code").value;

  if (!currentMission) return;

  if (currentMission.check(code)) {
    document.getElementById("output").innerText = "✅ Mission Passed";
    document.getElementById("ai").innerText = "🎉 Great job! +10 XP";

    addXP(10);
  } else {
    document.getElementById("output").innerText = "❌ Try again";
    giveAIHint(code);
  }
}

// 🤖 AI
function giveAIHint(code) {
  let response = "🤖 AI: ";

  if (code.length < 5) {
    response += "Start by writing some code!";
  } else if (!code.includes("print")) {
    response += "Use print() to show output.";
  } else {
    response += currentMission.hint;
  }

  document.getElementById("ai").innerText = response;
}
</script>
</body>
</html>
